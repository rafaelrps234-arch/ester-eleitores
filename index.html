<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rede Ester Carvalho</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
:root{
  --azul:#1a4fa0;--azul-escuro:#0d3070;--azul-claro:#e8f0ff;
  --verde:#1a7a3c;--verde-escuro:#145e2e;--verde-claro:#e8f5ee;
  --amarelo:#f5c400;--cinza-claro:#f2f4f3;--cinza:#777;--texto:#1a1a1a;
  --sombra:0 2px 14px rgba(0,0,0,.09);--r:12px
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:var(--cinza-claro);color:var(--texto);min-height:100vh}
header{background:linear-gradient(135deg,var(--azul) 0%,var(--verde) 100%);color:#fff;padding:0;overflow:hidden;box-shadow:var(--sombra)}
.header-inner{display:flex;align-items:center;gap:16px;padding:14px 20px}
.header-foto{width:56px;height:56px;border-radius:50%;object-fit:cover;border:3px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,.3);flex-shrink:0}
.header-texto h1{font-size:1.2rem;font-weight:800;line-height:1.2}
.header-texto p{font-size:.78rem;opacity:.85;margin-top:2px}
.header-slogan{background:rgba(0,0,0,.2);padding:6px 20px;font-size:.75rem;font-style:italic;opacity:.9;text-align:center}
.tabs{display:flex;background:var(--azul-escuro);overflow-x:auto;padding:0 8px;gap:2px}
.tab{padding:11px 18px;cursor:pointer;color:rgba(255,255,255,.65);font-size:.88rem;white-space:nowrap;border-bottom:3px solid transparent;background:none;border-top:none;border-left:none;border-right:none;transition:.2s}
.tab.ativo{color:#fff;border-bottom-color:var(--amarelo);font-weight:700}
.tela{display:none;padding:18px;max-width:960px;margin:0 auto}
.tela.ativa{display:block}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:18px}
.stat-card{background:#fff;border-radius:var(--r);padding:16px 12px;text-align:center;box-shadow:var(--sombra);border-top:4px solid var(--azul)}
.stat-card .num{font-size:2rem;font-weight:800;color:var(--azul)}
.stat-card .lbl{font-size:.75rem;color:var(--cinza);margin-top:3px}
.card{background:#fff;border-radius:var(--r);padding:20px;box-shadow:var(--sombra);margin-bottom:16px}
.card h2{color:var(--azul);font-size:1.05rem;margin-bottom:12px}
.btn{display:inline-block;padding:10px 20px;border-radius:8px;font-weight:700;font-size:.9rem;cursor:pointer;border:none;transition:.2s}
.btn-verde{background:var(--verde);color:#fff}.btn-verde:hover{background:var(--verde-escuro)}
.btn-azul{background:var(--azul);color:#fff}.btn-azul:hover{background:var(--azul-escuro)}
.btn-amarelo{background:var(--amarelo);color:#1a1a1a}
.btn-wa{background:#25d366;color:#fff;font-size:.8rem;padding:7px 12px;border-radius:7px;text-decoration:none;display:inline-block;border:none;cursor:pointer;font-weight:700}
.btn-red{background:#fff;color:#c0392b;border:1.5px solid #c0392b;border-radius:7px;padding:6px 10px;font-size:.8rem;cursor:pointer}
.btn-red:hover{background:#c0392b;color:#fff}
.btn-full{width:100%;padding:13px;font-size:1rem}
.campo{margin-bottom:14px}
.campo label{display:block;font-weight:600;font-size:.88rem;margin-bottom:5px}
.campo input,.campo select{width:100%;padding:10px 13px;border:1.5px solid #ddd;border-radius:8px;font-size:.95rem}
.campo input:focus,.campo select:focus{outline:none;border-color:var(--azul)}
.hint{font-size:.75rem;color:var(--cinza);margin-top:4px}
.endereco-auto{margin-top:7px;padding:9px 13px;background:var(--verde-claro);border-radius:8px;font-size:.82rem;color:var(--verde-escuro);display:none}
.apoiador-card{background:#fff;border-radius:var(--r);padding:13px 15px;margin-bottom:9px;box-shadow:var(--sombra);display:flex;align-items:center;gap:12px}
.avatar{width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,var(--azul),var(--verde));color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:1.1rem;flex-shrink:0}
.ainfo{flex:1;min-width:0}
.ainfo .nome{font-weight:700;font-size:.97rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ainfo .det{font-size:.78rem;color:var(--cinza);margin-top:2px}
.abadge{font-size:.72rem;background:var(--azul-claro);color:var(--azul);padding:2px 8px;border-radius:20px;font-weight:700;margin-top:4px;display:inline-block}
.acoes{display:flex;gap:6px;flex-shrink:0;flex-wrap:wrap;justify-content:flex-end}
.busca-wrap{display:flex;gap:8px;margin-bottom:12px}
.busca-wrap input{flex:1;padding:10px 13px;border:1.5px solid #ddd;border-radius:8px;font-size:.92rem}
.contador{font-size:.82rem;color:var(--cinza);margin-bottom:10px}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;z-index:9000;padding:16px}
.modal{background:#fff;border-radius:16px;padding:28px 24px;max-width:380px;width:100%;text-align:center}
.modal h3{color:var(--azul);font-size:1.15rem;margin-bottom:6px}
.modal p{color:var(--cinza);font-size:.85rem;margin-bottom:16px}
.modal-link{font-size:.75rem;color:var(--cinza);word-break:break-all;margin:10px 0;padding:8px;background:#f4f4f4;border-radius:6px}
.modal-acoes{display:flex;gap:8px;justify-content:center;margin-top:14px;flex-wrap:wrap}
.modal-close{position:absolute;top:12px;right:16px;font-size:1.5rem;cursor:pointer;color:var(--cinza);background:none;border:none}
.arvore-nivel{padding-left:20px;border-left:2px solid var(--azul-claro);margin-left:10px}
.arvore-no{margin:6px 0}
.arvore-no .no-box{display:flex;align-items:center;gap:8px;padding:8px 12px;background:#fff;border-radius:8px;box-shadow:0 1px 6px rgba(0,0,0,.07);cursor:pointer}
.arvore-no .no-box:hover{background:var(--azul-claro)}
.no-avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--azul),var(--verde));color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:.85rem;flex-shrink:0}
.no-info{flex:1}
.no-nome{font-weight:700;font-size:.88rem}
.no-det{font-size:.74rem;color:var(--cinza)}
.no-badge{font-size:.7rem;background:var(--amarelo);color:#1a1a1a;padding:1px 7px;border-radius:10px;font-weight:700}
.arvore-filhos{margin-top:4px;display:none}
.arvore-filhos.aberto{display:block}
.painel-apoiador{min-height:100vh;background:linear-gradient(135deg,var(--azul) 0%,var(--verde) 100%);padding:20px}
.painel-apoiador .inner{max-width:500px;margin:0 auto}
.painel-apoiador .header-card{background:rgba(255,255,255,.15);border-radius:var(--r);padding:20px;text-align:center;color:#fff;margin-bottom:16px}
.painel-apoiador .header-card h2{font-size:1.3rem;font-weight:800}
.painel-apoiador .mini-card{background:#fff;border-radius:var(--r);padding:16px;margin-bottom:12px;box-shadow:var(--sombra)}
.painel-apoiador .mini-card h3{color:var(--azul);font-size:.95rem;margin-bottom:10px}
.tela-cadastro-pub{min-height:100vh;background:linear-gradient(135deg,var(--azul) 0%,var(--verde) 100%);display:flex;align-items:center;justify-content:center;padding:20px}
.cadastro-card{background:#fff;border-radius:16px;padding:28px 24px;max-width:420px;width:100%}
.cadastro-card .topo{text-align:center;margin-bottom:20px}
.cadastro-card .topo img{width:100px;height:100px;border-radius:50%;object-fit:cover;border:3px solid var(--azul);margin-bottom:10px}
.cadastro-card .topo h1{color:var(--azul);font-size:1.3rem}
.cadastro-card .topo p{color:var(--cinza);font-size:.85rem;margin-top:4px}
.indicador-box{background:var(--verde-claro);border-radius:8px;padding:10px 14px;margin-bottom:16px;font-size:.85rem;color:var(--verde-escuro);font-weight:600}
.sucesso-tela{text-align:center;padding:20px}
.sucesso-tela .big{font-size:3rem;margin-bottom:12px}
.sucesso-tela h2{color:var(--azul);font-size:1.3rem;margin-bottom:8px}
.sucesso-tela p{color:var(--cinza);font-size:.9rem;margin-bottom:16px}
#toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--azul);color:#fff;padding:11px 22px;border-radius:30px;font-weight:600;font-size:.92rem;transition:transform .3s;z-index:9999;pointer-events:none}
#toast.show{transform:translateX(-50%) translateY(0)}
#toast.erro{background:#c0392b}
.vazio{text-align:center;padding:36px 20px;color:var(--cinza);font-size:.92rem}
.sync-info{font-size:.72rem;color:var(--cinza);text-align:right;margin-bottom:6px}
.login-tela{min-height:100vh;background:linear-gradient(135deg,var(--azul) 0%,var(--verde) 100%);display:flex;align-items:center;justify-content:center;padding:20px}
.login-card{background:#fff;border-radius:16px;padding:32px 28px;max-width:360px;width:100%;text-align:center}
.login-card img{width:90px;height:90px;border-radius:50%;object-fit:cover;border:3px solid var(--azul);margin-bottom:12px}
.login-card h1{color:var(--azul);font-size:1.3rem;margin-bottom:6px}
.login-card p{color:var(--cinza);font-size:.85rem;margin-bottom:24px}
.login-erro{color:#c0392b;font-size:.85rem;margin-top:10px;display:none}
.login-bloqueado{color:#c0392b;font-size:.85rem;margin-top:10px;font-weight:600;display:none}
.cidade-bar-wrap{margin-bottom:10px}
.cidade-bar-label{display:flex;justify-content:space-between;font-size:.85rem;margin-bottom:4px}
.cidade-bar-label .nome{font-weight:600}
.cidade-bar-label .qtd{color:var(--azul);font-weight:700}
.cidade-bar-bg{background:#f0f0f0;border-radius:20px;height:14px;overflow:hidden}
.cidade-bar-fill{height:100%;background:linear-gradient(90deg,var(--azul),var(--verde));border-radius:20px;transition:width .5s}
.seg-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.2);color:#fff;font-size:.75rem;padding:4px 10px;border-radius:20px;font-weight:600}
@media(max-width:480px){.stats{grid-template-columns:1fr 1fr}.stat-card:last-child{grid-column:span 2}}
</style>
</head>
<body>
<div id="app"></div>
<div id="toast"></div>
<div id="modal-qr" class="modal-bg" style="display:none" onclick="fecharModal(event)">
  <div class="modal" style="position:relative">
    <button class="modal-close" onclick="document.getElementById('modal-qr').style.display='none'">×</button>
    <h3>📱 Link de Indicação</h3>
    <p id="modal-nome-apoiador"></p>
    <div id="modal-qrcode"></div>
    <div class="modal-link" id="modal-link-texto"></div>
    <div class="modal-acoes">
      <button class="btn btn-azul" onclick="copiarLink()">📋 Copiar Link</button>
      <button class="btn btn-amarelo" onclick="imprimirQR()">🖨️ Imprimir</button>
    </div>
  </div>
</div>
<script>
const KEY='rede_ester_v2';
const SENHA='RAFAEL';
const SITE='https://tinyurl.com/3fmdcv6p';
const URL_SECRETA='rede2024';
const TIMEOUT_MS=30*60*1000;
const MAX_TENTATIVAS=3;
const BLOQUEIO_MS=5*60*1000;
const FOTO='https://rafaelrps234-arch.github.io/ester-eleitores/Imagem%20do%20WhatsApp%202026-06-24%20%C3%A0s%2020.36.03.jpeg';

function getTentativas(){try{return JSON.parse(localStorage.getItem('_t'))||{n:0,t:0};}catch{return{n:0,t:0};}}
function setTentativas(n,t){localStorage.setItem('_t',JSON.stringify({n,t}));}
function estaBloqueado(){const t=getTentativas();if(t.n>=MAX_TENTATIVAS&&Date.now()-t.t<BLOQUEIO_MS)return Math.ceil((BLOQUEIO_MS-(Date.now()-t.t))/1000);return 0;}
function registrarErro(){const t=getTentativas();setTentativas(t.n+1,Date.now());}
function resetarTentativas(){setTentativas(0,0);}
function adminLogado(){
  const ok=sessionStorage.getItem('admin_ok')==='1';
  const ts=parseInt(sessionStorage.getItem('admin_ts')||'0');
  if(ok&&Date.now()-ts>TIMEOUT_MS){sessionStorage.removeItem('admin_ok');sessionStorage.removeItem('admin_ts');return false;}
  if(ok)sessionStorage.setItem('admin_ts',Date.now());
  return ok;
}
function setAdminLogado(){sessionStorage.setItem('admin_ok','1');sessionStorage.setItem('admin_ts',Date.now());}
function load(){try{return JSON.parse(localStorage.getItem(KEY))||[];}catch{return[];}}
function save(d){try{localStorage.setItem(KEY,JSON.stringify(d));}catch{toast('Erro ao salvar',true);}}

const params=new URLSearchParams(location.search);
const modoCadastro=params.get('cadastro')==='1';
const refId=params.get('ref')||null;
const painelId=params.get('painel')||null;
const urlKey=params.get('admin')||'';

if(modoCadastro)renderCadastroPublico(refId);
else if(painelId)renderPainelApoiador(painelId);
else if(urlKey===URL_SECRETA&&adminLogado())renderAdmin();
else if(urlKey===URL_SECRETA)renderLogin();
else renderPublica();

function baseUrl(){return 'https://rafaelrps234-arch.github.io/ester-eleitores/';}
function linkCadastro(r){return r?baseUrl()+'?cadastro=1&ref='+r:SITE;}
function linkPainel(id){return baseUrl()+'?painel='+id;}
function linkAdmin(){return baseUrl()+'?admin='+URL_SECRETA;}

function renderPublica(){
  document.getElementById('app').innerHTML=`
  <div style="min-height:100vh;background:linear-gradient(135deg,#1a4fa0 0%,#1a7a3c 100%);display:flex;align-items:center;justify-content:center;padding:20px">
    <div style="background:#fff;border-radius:16px;padding:32px 24px;max-width:400px;width:100%;text-align:center;box-shadow:0 8px 40px rgba(0,0,0,.25)">
      <img src="${FOTO}" style="width:110px;height:110px;border-radius:50%;object-fit:cover;border:4px solid #1a4fa0;margin-bottom:14px" onerror="this.style.display='none'">
      <h1 style="color:#1a4fa0;font-size:1.5rem;font-weight:800">Ester Carvalho</h1>
      <p style="color:#777;font-size:.85rem;margin-top:4px;margin-bottom:6px">Pré-candidata a Deputada Federal</p>
      <p style="color:#1a7a3c;font-size:.9rem;font-style:italic;margin-bottom:20px">🐾 Política se faz com amor</p>
      <a href="${SITE}" style="display:block;text-decoration:none;background:#1a4fa0;color:#fff;padding:14px;border-radius:8px;font-weight:700;font-size:1rem">🤝 Quero Apoiar!</a>
    </div>
  </div>`;
}

function renderLogin(){
  const bloq=estaBloqueado();
  document.getElementById('app').innerHTML=`
  <div class="login-tela"><div class="login-card">
    <img src="${FOTO}" onerror="this.style.display='none'">
    <h1>Acesso Restrito</h1>
    <p>Painel Administrativo — Rede Ester Carvalho</p>
    <div class="campo"><label>Senha</label><input id="inp-senha" type="password" placeholder="Digite a senha" onkeydown="if(event.key==='Enter')entrar()" ${bloq?'disabled':''}></div>
    <button class="btn btn-azul btn-full" onclick="entrar()" ${bloq?'disabled':''}>🔐 Entrar</button>
    <div class="login-erro" id="login-erro">Senha incorreta. Tentativas restantes: <span id="rest">${MAX_TENTATIVAS-getTentativas().n}</span></div>
    <div class="login-bloqueado" id="login-bloq" style="${bloq?'display:block':'display:none'}">🚫 Acesso bloqueado. Tente em ${Math.ceil((bloq||0)/60)} minuto(s).</div>
  </div></div>`;
  if(bloq)setTimeout(()=>renderLogin(),bloq*1000);
  else setTimeout(()=>document.getElementById('inp-senha')?.focus(),100);
}

function entrar(){
  const bloq=estaBloqueado();if(bloq){toast('Acesso bloqueado!',true);return;}
  const v=document.getElementById('inp-senha').value.trim().toUpperCase();
  if(v===SENHA){resetarTentativas();setAdminLogado();renderAdmin();}
  else{
    registrarErro();
    const t=getTentativas(),rest=MAX_TENTATIVAS-t.n;
    const erroEl=document.getElementById('login-erro');
    erroEl.style.display='block';
    if(rest>0){document.getElementById('rest').textContent=rest;}
    else{erroEl.style.display='none';document.getElementById('login-bloq').style.display='block';document.getElementById('inp-senha').disabled=true;document.querySelector('.btn-full').disabled=true;setTimeout(()=>renderLogin(),BLOQUEIO_MS);}
  }
}

function renderAdmin(){
  document.getElementById('app').innerHTML=`
  <header>
    <div class="header-inner">
      <img src="${FOTO}" class="header-foto" onerror="this.style.display='none'">
      <div class="header-texto"><h1>Rede Ester Carvalho</h1><p>Painel Administrativo</p></div>
      <div style="margin-left:auto;display:flex;align-items:center;gap:8px">
        <span class="seg-badge">🔒 Seguro</span>
        <button onclick="sair()" style="background:rgba(255,255,255,.2);border:none;color:#fff;padding:6px 14px;border-radius:8px;cursor:pointer;font-size:.85rem">🚪 Sair</button>
      </div>
    </div>
    <div class="header-slogan">🐾 Política se faz com amor — Pré-candidata a Deputada Federal</div>
  </header>
  <div class="tabs">
    <button class="tab ativo" onclick="tab(this,'painel')">📊 Painel</button>
    <button class="tab" onclick="tab(this,'lista')">👥 Apoiadores</button>
    <button class="tab" onclick="tab(this,'arvore')">🌳 Rede</button>
    <button class="tab" onclick="tab(this,'mapa')">📍 Cidades DF</button>
    <button class="tab" onclick="tab(this,'cadAdm')">➕ Cadastrar</button>
  </div>
  <div id="tela-painel" class="tela ativa">
    <div class="stats">
      <div class="stat-card"><div class="num" id="s-total">0</div><div class="lbl">Total de Apoiadores</div></div>
      <div class="stat-card"><div class="num" id="s-hoje">0</div><div class="lbl">Cadastrados Hoje</div></div>
      <div class="stat-card"><div class="num" id="s-semana">0</div><div class="lbl">Esta Semana</div></div>
    </div>
    <div class="card">
      <h2>📱 QR Code Geral</h2>
      <p style="font-size:.84rem;color:var(--cinza);margin-bottom:14px">Escaneie para se cadastrar como apoiador.</p>
      <div id="qr-raiz" style="display:inline-block;padding:10px;background:#fff;border:2px solid var(--azul-claro);border-radius:8px"></div><br>
      <div style="font-size:.75rem;color:var(--cinza);word-break:break-all;margin:10px 0" id="link-raiz"></div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:8px">
        <button class="btn btn-amarelo" onclick="copiarTexto(document.getElementById('link-raiz').textContent)">📋 Copiar Link</button>
        <button class="btn btn-azul" onclick="imprimirQRRaiz()">🖨️ Imprimir</button>
      </div>
    </div>
    <div class="card" style="background:var(--azul-claro);border:1.5px solid var(--azul)">
      <h2>🔒 Link Seguro do Painel Admin</h2>
      <p style="font-size:.82rem;color:var(--azul-escuro);margin-bottom:10px">Guarde este link — só quem tiver ele acessa o painel:</p>
      <div style="background:#fff;border-radius:8px;padding:10px;font-size:.75rem;word-break:break-all;color:#444;margin-bottom:10px" id="link-admin-seguro"></div>
      <button class="btn btn-azul" onclick="copiarTexto(document.getElementById('link-admin-seguro').textContent)">📋 Copiar Link Admin</button>
    </div>
    <div class="sync-info" id="sync-txt">Sincronizando...</div>
  </div>
  <div id="tela-lista" class="tela">
    <div class="busca-wrap"><input id="busca" type="text" placeholder="🔍 Buscar nome, telefone, cidade..." oninput="renderLista()"></div>
    <div class="contador" id="contador"></div>
    <div id="lista"></div>
  </div>
  <div id="tela-arvore" class="tela">
    <div class="card"><h2>🌳 Árvore da Rede</h2><p style="font-size:.82rem;color:var(--cinza);margin-bottom:14px">Clique num apoiador para ver seus indicados</p><div id="arvore"></div></div>
  </div>
  <div id="tela-mapa" class="tela">
    <div class="card"><h2>📍 Apoiadores por Cidade do DF</h2><p style="font-size:.82rem;color:var(--cinza);margin-bottom:16px">Ranking das cidades com mais apoiadores</p><div id="ranking-cidades"></div></div>
  </div>
  <div id="tela-cadAdm" class="tela">
    <div class="card">
      <h2>➕ Cadastrar Apoiador</h2>
      <div class="campo"><label>Nome completo *</label><input id="a-nome" type="text" placeholder="Nome do apoiador"></div>
      <div class="campo"><label>WhatsApp *</label><input id="a-fone" type="tel" placeholder="(00) 00000-0000" maxlength="15" oninput="mascaraTel(this)"></div>
      <div class="campo"><label>CEP</label><input id="a-cep" type="text" placeholder="00000-000" maxlength="9" oninput="mascaraCep(this)" onblur="buscaCep('a')"><div class="endereco-auto" id="a-end"></div></div>
      <div class="campo"><label>Indicado por (opcional)</label><select id="a-ref"><option value="">— Nenhum (raiz da rede) —</option></select></div>
      <button class="btn btn-azul btn-full" onclick="salvarAdmin()">✅ Salvar Apoiador</button>
    </div>
  </div>`;
  document.getElementById('link-raiz').textContent=SITE;
  document.getElementById('link-admin-seguro').textContent=linkAdmin();
  new QRCode(document.getElementById('qr-raiz'),{text:SITE,width:280,height:280,colorDark:'#1a4fa0',colorLight:'#ffffff',correctLevel:QRCode.CorrectLevel.M});
  atualizarStats();renderLista();populaSelectRef();
  let idle=setTimeout(()=>{toast('Sessão expirada',true);setTimeout(sair,2000);},TIMEOUT_MS);
  document.addEventListener('click',()=>{clearTimeout(idle);sessionStorage.setItem('admin_ts',Date.now());idle=setTimeout(()=>{toast('Sessão expirada',true);setTimeout(sair,2000);},TIMEOUT_MS);});
  setInterval(()=>{atualizarStats();renderLista();renderArvore();document.getElementById('sync-txt').textContent='Atualizado às '+new Date().toLocaleTimeString('pt-BR');},10000);
}

function sair(){sessionStorage.removeItem('admin_ok');sessionStorage.removeItem('admin_ts');renderLogin();}
function tab(btn,id){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('ativo'));
  document.querySelectorAll('.tela').forEach(t=>t.classList.remove('ativa'));
  btn.classList.add('ativo');document.getElementById('tela-'+id).classList.add('ativa');
  if(id==='lista')renderLista();if(id==='arvore')renderArvore();if(id==='cadAdm')populaSelectRef();if(id==='mapa')renderCidades();
}
function atualizarStats(){
  const d=load(),hoje=new Date().toDateString(),semana=Date.now()-7*24*60*60*1000;
  document.getElementById('s-total').textContent=d.length;
  document.getElementById('s-hoje').textContent=d.filter(a=>new Date(a.data).toDateString()===hoje).length;
  document.getElementById('s-semana').textContent=d.filter(a=>new Date(a.data)>=semana).length;
}
function renderCidades(){
  const d=load(),el=document.getElementById('ranking-cidades');
  if(!d.length){el.innerHTML='<div class="vazio">Nenhum apoiador cadastrado ainda.</div>';return;}
  const contagem={};
  d.forEach(a=>{const c=(a.cidade||'').trim().toUpperCase();if(c)contagem[c]=(contagem[c]||0)+1;});
  if(!Object.keys(contagem).length){el.innerHTML='<div class="vazio">Nenhum apoiador com cidade identificada.<br><small>CEP precisa ser preenchido.</small></div>';return;}
  const sorted=Object.entries(contagem).sort((a,b)=>b[1]-a[1]);
  const max=sorted[0][1],total=d.length,medalhas=['🥇','🥈','🥉'];
  el.innerHTML=sorted.map(([cidade,qtd],i)=>{
    const pct=Math.round((qtd/max)*100),pctTotal=Math.round((qtd/total)*100);
    return`<div class="cidade-bar-wrap">
      <div class="cidade-bar-label"><span class="nome">${i<3?medalhas[i]:''} ${cidade}</span><span class="qtd">${qtd} apoiador${qtd>1?'es':''} (${pctTotal}%)</span></div>
      <div class="cidade-bar-bg"><div class="cidade-bar-fill" style="width:${pct}%"></div></div>
    </div>`;
  }).join('');
  const sem=d.filter(a=>!a.cidade||!a.cidade.trim()).length;
  if(sem>0)el.innerHTML+=`<div style="margin-top:14px;font-size:.8rem;color:var(--cinza)">⚠️ ${sem} apoiador${sem>1?'es':''} sem cidade</div>`;
}
function renderLista(){
  const d=load(),busca=(document.getElementById('busca')?.value||'').toLowerCase();
  const f=busca?d.filter(a=>(a.nome||'').toLowerCase().includes(busca)||(a.fone||'').includes(busca)||(a.cidade||'').toLowerCase().includes(busca)):d;
  document.getElementById('contador').textContent=f.length+' apoiador(es)';
  const el=document.getElementById('lista');
  if(!f.length){el.innerHTML='<div class="vazio">Nenhum apoiador cadastrado.</div>';return;}
  const refs=buildRefMap(d);
  el.innerHTML=[...f].sort((a,b)=>new Date(b.data)-new Date(a.data)).map(a=>{
    const fNum=(a.fone||'').replace(/\D/g,'');
    const local=[a.bairro,a.cidade,a.uf].filter(Boolean).join(', ')||'—';
    const filhos=refs[a.id]||0;
    const ind=a.refId?(d.find(x=>x.id===a.refId)?.nome||'?'):'Raiz';
    return`<div class="apoiador-card">
      <div class="avatar">${(a.nome||'?')[0].toUpperCase()}</div>
      <div class="ainfo">
        <div class="nome">${a.nome}</div>
        <div class="det">📱 ${a.fone||'—'} | 📍 ${local}</div>
        <div class="det">👤 ${ind} | 📅 ${new Date(a.data).toLocaleDateString('pt-BR')}</div>
        <span class="abadge">🌿 ${filhos} indicado(s)</span>
      </div>
      <div class="acoes">
        ${fNum?`<a class="btn-wa" href="https://wa.me/55${fNum}" target="_blank">WhatsApp</a>`:''}
        <button class="btn btn-amarelo" style="font-size:.78rem;padding:7px 10px" onclick="abrirModalQR('${a.id}')">📱 QR</button>
        <button class="btn-red" onclick="excluir('${a.id}')">✕</button>
      </div>
    </div>`;
  }).join('');
}
function renderArvore(){
  const d=load(),el=document.getElementById('arvore');
  if(!el)return;
  if(!d.length){el.innerHTML='<div class="vazio">Nenhum apoiador cadastrado.</div>';return;}
  el.innerHTML=d.filter(a=>!a.refId).map(a=>renderNo(a,d,0)).join('');
}
function renderNo(a,todos,nivel){
  const filhos=todos.filter(x=>x.refId===a.id),tem=filhos.length>0;
  const local=[a.cidade,a.uf].filter(Boolean).join('/')||'';
  return`<div class="arvore-no">
    <div class="no-box" onclick="toggleNo('f-${a.id}',this)">
      <div class="no-avatar">${(a.nome||'?')[0].toUpperCase()}</div>
      <div class="no-info"><div class="no-nome">${a.nome}</div><div class="no-det">${local?local+' · ':''}${a.fone||''}</div></div>
      ${tem?`<span class="no-badge">${filhos.length} 👥</span><span style="color:var(--cinza);font-size:.9rem">▶</span>`:''}
    </div>
    ${tem?`<div id="f-${a.id}" class="arvore-filhos"><div class="arvore-nivel">${filhos.map(f=>renderNo(f,todos,nivel+1)).join('')}</div></div>`:''}
  </div>`;
}
function toggleNo(id,box){
  const el=document.getElementById(id);if(!el)return;
  el.classList.toggle('aberto');
  const arr=box.querySelector('span:last-child');
  if(arr)arr.textContent=el.classList.contains('aberto')?'▼':'▶';
}
function populaSelectRef(){
  const d=load(),sel=document.getElementById('a-ref');if(!sel)return;
  sel.innerHTML='<option value="">— Nenhum (raiz da rede) —</option>'+[...d].sort((a,b)=>(a.nome||'').localeCompare(b.nome||'')).map(a=>`<option value="${a.id}">${a.nome}</option>`).join('');
}
function salvarAdmin(){
  const nome=document.getElementById('a-nome').value.trim(),fone=document.getElementById('a-fone').value.trim();
  if(!nome){toast('Informe o nome',true);return;}if(!fone){toast('Informe o WhatsApp',true);return;}
  const endEl=document.getElementById('a-end'),endD=endEl._dados||{};
  const ap={id:Date.now().toString(36)+Math.random().toString(36).slice(2,6),nome,fone,cep:document.getElementById('a-cep').value.trim(),refId:document.getElementById('a-ref').value||null,bairro:endD.bairro||'',cidade:endD.cidade||'',uf:endD.uf||'',logradouro:endD.logradouro||'',data:new Date().toISOString()};
  const d=load();d.push(ap);save(d);atualizarStats();
  ['a-nome','a-fone','a-cep'].forEach(i=>document.getElementById(i).value='');
  endEl.style.display='none';endEl._dados=null;document.getElementById('a-ref').value='';
  toast('Apoiador cadastrado! ✅');
}
function excluir(id){if(!confirm('Remover este apoiador?'))return;save(load().filter(a=>a.id!==id));renderLista();atualizarStats();toast('Removido');}
let modalLinkAtual='';
function abrirModalQR(id){
  const d=load(),ap=d.find(a=>a.id===id);if(!ap)return;
  const link=linkCadastro(id);modalLinkAtual=link;
  document.getElementById('modal-nome-apoiador').textContent='Link de '+ap.nome;
  document.getElementById('modal-link-texto').textContent=link;
  document.getElementById('modal-qrcode').innerHTML='';
  new QRCode(document.getElementById('modal-qrcode'),{text:link,width:280,height:280,colorDark:'#1a4fa0',colorLight:'#ffffff',correctLevel:QRCode.CorrectLevel.M});
  document.getElementById('modal-qr').style.display='flex';
}
function fecharModal(e){if(e.target.id==='modal-qr')document.getElementById('modal-qr').style.display='none';}
function copiarLink(){copiarTexto(modalLinkAtual);}
function copiarTexto(txt){navigator.clipboard.writeText(txt).then(()=>toast('Link copiado!')).catch(()=>{const ta=document.createElement('textarea');ta.value=txt;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);toast('Link copiado!');});}
function imprimirQR(){
  const img=document.querySelector('#modal-qrcode img'),link=document.getElementById('modal-link-texto').textContent,nome=document.getElementById('modal-nome-apoiador').textContent;
  if(!img){toast('QR ainda não gerado',true);return;}
  const w=window.open('','_blank');
  w.document.write(`<html><head><title>QR</title><style>body{font-family:Arial;text-align:center;padding:40px}h1{color:#1a4fa0}p{color:#555;font-size:13px;word-break:break-all}img{border:3px solid #1a4fa0;border-radius:10px;padding:8px}</style></head><body><h1>Rede Ester Carvalho</h1><p>${nome}</p><img src="${img.src}" width="250"><p>${link}</p></body></html>`);
  w.document.close();setTimeout(()=>w.print(),500);
}
function imprimirQRRaiz(){
  const img=document.querySelector('#qr-raiz img'),link=SITE;
  if(!img){toast('QR ainda não gerado',true);return;}
  const w=window.open('','_blank');
  w.document.write(`<html><head><title>QR Ester</title><style>body{font-family:Arial;text-align:center;padding:40px}h1{color:#1a4fa0}p{color:#555;font-size:13px;word-break:break-all}img{border:3px solid #1a4fa0;border-radius:10px;padding:8px}</style></head><body><h1>Rede Ester Carvalho</h1><p>Escaneie para se cadastrar como apoiador</p><img src="${img.src}" width="250"><p>${link}</p></body></html>`);
  w.document.close();setTimeout(()=>w.print(),500);
}
function buildRefMap(d){const m={};d.forEach(a=>{if(a.refId)m[a.refId]=(m[a.refId]||0)+1;});return m;}
function renderPainelApoiador(id){
  const d=load(),ap=d.find(a=>a.id===id),app=document.getElementById('app');
  if(!ap){app.innerHTML=`<div style="text-align:center;padding:60px 20px"><div style="font-size:3rem">⚠️</div><h2 style="color:#c0392b;margin-top:12px">Apoiador não encontrado</h2></div>`;return;}
  const meuLink=linkCadastro(id),filhos=d.filter(x=>x.refId===id),ind=ap.refId?(d.find(x=>x.id===ap.refId)?.nome||'?'):'Rede Ester';
  app.innerHTML=`<div class="painel-apoiador"><div class="inner">
    <div class="header-card">
      <img src="${FOTO}" style="width:70px;height:70px;border-radius:50%;object-fit:cover;border:3px solid #fff;margin-bottom:10px" onerror="this.style.display='none'">
      <h2>Olá, ${ap.nome.split(' ')[0]}!</h2><p>Seu painel de indicações — Rede Ester Carvalho</p>
    </div>
    <div class="mini-card"><h3>📊 Sua rede</h3>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;text-align:center">
        <div style="background:var(--azul-claro);border-radius:8px;padding:14px"><div style="font-size:1.8rem;font-weight:800;color:var(--azul)">${filhos.length}</div><div style="font-size:.75rem;color:var(--cinza)">Indicados diretos</div></div>
        <div style="background:var(--verde-claro);border-radius:8px;padding:14px"><div style="font-size:1.8rem;font-weight:800;color:var(--verde)">${contarRede(id,d)}</div><div style="font-size:.75rem;color:var(--cinza)">Total na sua rede</div></div>
      </div>
      <div style="margin-top:10px;font-size:.8rem;color:var(--cinza)">Indicado por: <strong>${ind}</strong></div>
    </div>
    <div class="mini-card"><h3>📱 Seu link de indicação</h3>
      <div style="background:#f4f4f4;border-radius:8px;padding:10px;font-size:.75rem;word-break:break-all;color:#444;margin-bottom:12px">${meuLink}</div>
      <div id="qr-meu" style="display:inline-block;padding:8px;background:#fff;border:2px solid var(--azul-claro);border-radius:8px;margin-bottom:12px"></div><br>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button class="btn btn-azul" onclick="copiarTexto('${meuLink}')">📋 Copiar Link</button>
        <button class="btn btn-amarelo" onclick="compartilharWA('${meuLink}','${ap.nome}')">📤 Compartilhar</button>
      </div>
    </div>
    ${filhos.length?`<div class="mini-card"><h3>👥 Seus indicados (${filhos.length})</h3>${filhos.map(f=>`<div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #f0f0f0"><div class="avatar" style="width:36px;height:36px;font-size:1rem">${(f.nome||'?')[0].toUpperCase()}</div><div><div style="font-weight:700;font-size:.9rem">${f.nome}</div><div style="font-size:.78rem;color:var(--cinza)">${f.fone||''} ${f.cidade?'· '+f.cidade:''}</div></div></div>`).join('')}</div>`:''}
  </div></div>`;
  new QRCode(document.getElementById('qr-meu'),{text:meuLink,width:240,height:240,colorDark:'#1a4fa0',colorLight:'#ffffff',correctLevel:QRCode.CorrectLevel.M});
}
function contarRede(id,d,v=new Set()){if(v.has(id))return 0;v.add(id);return d.filter(x=>x.refId===id).reduce((a,f)=>a+1+contarRede(f.id,d,v),0);}
function compartilharWA(link,nome){window.open('https://wa.me/?text='+encodeURIComponent('Olá! Sou '+nome+' e quero contar com o seu apoio à Ester Carvalho.\n\nSe cadastre pelo meu link:\n'+link),'_blank');}
function renderCadastroPublico(refId){
  const d=load(),ind=refId?d.find(a=>a.id===refId):null;
  document.getElementById('app').innerHTML=`<div class="tela-cadastro-pub"><div class="cadastro-card" id="cad-card">
    <div class="topo">
      <img src="${FOTO}" onerror="this.style.display='none'">
      <h1>Apoie Ester Carvalho!</h1>
      <p>🐾 Política se faz com amor<br>Pré-candidata a Deputada Federal</p>
    </div>
    ${ind?`<div class="indicador-box">👤 Indicado por <strong>${ind.nome}</strong></div>`:''}
    <div class="campo"><label>Nome completo *</label><input id="p-nome" type="text" placeholder="Seu nome completo"></div>
    <div class="campo"><label>WhatsApp *</label><input id="p-fone" type="tel" placeholder="(00) 00000-0000" maxlength="15" oninput="mascaraTel(this)"></div>
    <div class="campo"><label>CEP *</label><input id="p-cep" type="text" placeholder="00000-000" maxlength="9" oninput="mascaraCep(this)" onblur="buscaCep('p')"><div class="endereco-auto" id="p-end"></div><div class="hint">Necessário para identificar sua cidade</div></div>
    <button class="btn btn-azul btn-full" onclick="salvarPublico('${refId||''}')">🤝 Quero Apoiar!</button>
  </div></div>`;
}
function salvarPublico(refId){
  const nome=document.getElementById('p-nome').value.trim(),fone=document.getElementById('p-fone').value.trim();
  if(!nome){toast('Informe seu nome',true);return;}if(!fone){toast('Informe seu WhatsApp',true);return;}
  const endEl=document.getElementById('p-end'),endD=endEl._dados||{};
  const ap={id:Date.now().toString(36)+Math.random().toString(36).slice(2,6),nome,fone,cep:document.getElementById('p-cep').value.trim(),refId:refId||null,bairro:endD.bairro||'',cidade:endD.cidade||'',uf:endD.uf||'',logradouro:endD.logradouro||'',data:new Date().toISOString()};
  const d=load();d.push(ap);save(d);
  const meuLink=linkCadastro(ap.id),meuPainel=linkPainel(ap.id);
  document.getElementById('cad-card').innerHTML=`<div class="sucesso-tela">
    <img src="${FOTO}" style="width:80px;height:80px;border-radius:50%;object-fit:cover;border:3px solid var(--azul);margin-bottom:12px" onerror="this.style.display='none'">
    <div class="big">✅</div>
    <h2>Obrigado, ${nome.split(' ')[0]}!</h2>
    <p>Você agora faz parte da Rede Ester Carvalho!</p>
    <div style="background:var(--verde-claro);border-radius:10px;padding:14px;margin:16px 0;font-size:.85rem;color:var(--verde-escuro)"><strong>Espalhe a rede!</strong><br>Compartilhe seu link para indicar mais pessoas.</div>
    <div style="background:#f4f4f4;border-radius:8px;padding:10px;font-size:.73rem;word-break:break-all;color:#444;margin-bottom:14px">${meuLink}</div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;justify-content:center">
      <button class="btn btn-azul" onclick="copiarTexto('${meuLink}')">📋 Copiar meu link</button>
      <button class="btn btn-amarelo" onclick="compartilharWA('${meuLink}','${nome}')">📤 WhatsApp</button>
    </div>
    <div style="margin-top:16px"><a href="${meuPainel}" class="btn btn-verde" style="font-size:.85rem;padding:10px 18px">📊 Ver meu painel</a></div>
  </div>`;
}
function mascaraTel(input){let v=input.value.replace(/\D/g,'').substring(0,11);if(v.length>10)v=v.replace(/^(\d{2})(\d{5})(\d{4}).*/,'($1) $2-$3');else if(v.length>6)v=v.replace(/^(\d{2})(\d{4})(\d*)/,'($1) $2-$3');else if(v.length>2)v=v.replace(/^(\d{2})(\d*)/,'($1) $2');input.value=v;}
function mascaraCep(input){let v=input.value.replace(/\D/g,'').substring(0,8);if(v.length>5)v=v.replace(/^(\d{5})(\d*)/,'$1-$2');input.value=v;}
async function buscaCep(pfx){
  const cepIn=document.getElementById(pfx+'-cep'),endEl=document.getElementById(pfx+'-end'),cep=cepIn.value.replace(/\D/g,'');
  if(cep.length!==8)return;endEl.style.display='block';endEl.textContent='🔍 Buscando...';endEl._dados=null;
  try{const r=await fetch(`https://viacep.com.br/ws/${cep}/json/`),data=await r.json();
    if(data.erro){endEl.textContent='⚠️ CEP não encontrado';return;}
    endEl._dados={logradouro:data.logradouro,bairro:data.bairro,cidade:data.localidade,uf:data.uf};
    endEl.textContent=`📍 ${[data.logradouro,data.bairro,data.localidade,data.uf].filter(Boolean).join(', ')}`;}
  catch{endEl.textContent='⚠️ Erro ao buscar CEP';}
}
let _tt;
function toast(msg,erro=false){const el=document.getElementById('toast');el.textContent=msg;el.className=erro?'erro show':'show';clearTimeout(_tt);_tt=setTimeout(()=>el.className='',3000);}
</script>
</body>
</html>
